ci:
  autoupdate_commit_msg: 'chore: update pre-commit hooks'
  autofix_commit_msg: 'style: pre-commit fixes'

# Global exclusion for all logs directories and their contents
exclude: (?x)^.*logs\/.*$

repos:
  # Fast syntax and security checks first
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 'v5.0.0'
    hooks:
      - id: check-json
      - id: check-yaml
        exclude: ^\.secrets$
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-added-large-files
        args: ['--maxkb=2000', '--enforce-all']
        exclude: hero\.gif|codeveloping-an-assurance-case\.pdf|src/generated/prisma/

  - repo: local
    hooks:
      - id: detect-secrets
        name: detect-secrets
        entry: bash -c 'uv tool run --from detect-secrets detect-secrets-hook --baseline .secrets.baseline "$@"' --
        language: system
        files: '.*'
        exclude: '(\.secrets\.baseline|pnpm-lock\.yaml|\.beads/)$'

  # Frontend linting and formatting with Biome/Ultracite (staged files only)
  - repo: local
    hooks:
      - id: ultracite-lint
        name: ultracite lint (staged files)
        entry: bash -c 'FILES=$(git diff --cached --name-only --diff-filter=ACM | grep -E "\.(jsx?|tsx?|json)$" || true); [ -z "$FILES" ] && exit 0; echo "$FILES" | xargs npx ultracite lint'
        language: system
        pass_filenames: false
        files: '\.(jsx?|tsx?|json)$'
        exclude: '(node_modules|\.next|public/documentation|logs)/'

      - id: ultracite-format
        name: ultracite format (staged files, safe fixes only)
        entry: bash -c 'FILES=$(git diff --cached --name-only --diff-filter=ACM | grep -E "\.(jsx?|tsx?|json)$" || true); [ -z "$FILES" ] && exit 0; echo "$FILES" | xargs npx ultracite format || true'
        language: system
        pass_filenames: false
        files: '\.(jsx?|tsx?|json)$'
        exclude: '(node_modules|\.next|public/documentation|logs)/'

  # TypeScript type checking (skip if no TS files staged)
  - repo: local
    hooks:
      - id: tsc
        name: TypeScript Compiler
        entry: bash -c 'git diff --cached --name-only | grep -qE "\.(ts|tsx)$" && npx tsc --noEmit --skipLibCheck || true'
        language: system
        files: '\.(ts|tsx)$'
        exclude: '\.next/'
        pass_filenames: false

  # File cleanup (last, so it doesn't interfere with other tools)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 'v5.0.0'
    hooks:
      - id: debug-statements
        files: \.(js|jsx|ts|tsx)$
      - id: end-of-file-fixer
        exclude: \.(svg|png|jpg|jpeg|gif)$|tsconfig\.tsbuildinfo$|^\.beads/
      - id: mixed-line-ending
        exclude: \.(svg|png|jpg|jpeg|gif)$|^\.beads/
      - id: trailing-whitespace
        exclude: \.(svg|png|jpg|jpeg|gif|md)$|^\.beads/
